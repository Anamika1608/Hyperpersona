<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">HyperPersona favicon</title>
  <desc id="desc">A lowercase serif h monogram with a terracotta personalization signal.</desc>
  <defs>
    <linearGradient id="surface" x1="8" y1="6" x2="58" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffdf9" />
      <stop offset="1" stop-color="#f7f1e8" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#221c17" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#surface)" stroke="#e9e3da" />
  <text
    x="31"
    y="46"
    fill="#221c17"
    filter="url(#soft-shadow)"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-3"
    text-anchor="middle"
  >h</text>
  <circle cx="46" cy="18" r="5.5" fill="#b86f4d" />
  <circle cx="46" cy="18" r="2" fill="#fffdf9" opacity="0.9" />
</svg>
